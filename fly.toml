# fly.toml
app = 'maxcamrh-dark-frost-5423'
primary_region = 'gru'
console_command = 'php /var/www/html/artisan tinker'

[build]
# Usa o Dockerfile na raiz do projeto

[env]
APP_URL = "https://maxcamrh-dark-frost-5423.fly.dev"
APP_ENV = "production"
APP_DEBUG = "false"
DB_CONNECTION = "pgsql"
QUEUE_CONNECTION = "database"
SESSION_DRIVER = "database"
SESSION_SECURE_COOKIE = "true"
LOG_CHANNEL = "stderr"
LOG_LEVEL = "info"
LOG_STDERR_FORMATTER = "Monolog\\Formatter\\JsonFormatter"

[mounts]
source = "maxcamrh_storage"
destination = "/var/www/html/storage"

[processes]
web = "" # O processo web agora é gerenciado pelo ENTRYPOINT do Dockerfile
queue = "php /var/www/html/artisan queue:work database --sleep=3 --tries=3 --timeout=300"

[http_service]
internal_port = 8080 # Porta que o Nginx está escutando DENTRO do container
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["web"]

[[http_service.http_checks]]
interval = "15s"
timeout = "2s"
grace_period = "5s"
method = "GET"
path = "/up"
protocol = "http"
tls_skip_verify = true

[schedules]
cron = { schedule = "*/1 * * * *", command = "php /var/www/html/artisan schedule:run" }
